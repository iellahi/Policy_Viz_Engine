# ==============================================================================
# render_config.yml — CERP Automated Visualization Suite (Phase 3)
# ------------------------------------------------------------------------------
# THIS is the file you edit — never the R. `2_R/2.2_master_knit.R` reads it.
#
# Model: OVERRIDE-ONLY. Each template's own YAML header still holds its full set
# of default params. Here you list ONLY what you want to change. Anything you
# omit falls back to the template default.
#
# Each entry under `reports:` renders one HTML into 4_output/ named <id>.html.
#   id        (required) unique key; also the output filename stem.
#   template  (required) filename in 3_templates/.
#   data      (optional) dataset filename; resolved under `defaults.data_dir`
#             via here(). Omit to use the template's own default data_path.
#   enabled   (optional, default true) set false to skip without deleting.
#   params    (optional) map of param overrides passed straight to render().
#
# Same template may appear in several entries (different id + data) to render
# it more than once. To point a visual at field data, just change `data:`.
# ==============================================================================

defaults:
  data_dir: "1_data"          # dataset names resolve here via here::here()
  


reports:

  - id: baseline_endline
    template: 3.01_baseline_endline.Rmd
    data: master_micro_survey.csv
    enabled: true
    params:
      group_var: treatment_group
      report_title: "Program Impact: Dumbbell Plot"

  - id: distribution_shifts
    template: 3.02_distribution_shifts.Rmd
    data: master_micro_survey.csv
    enabled: true
    params:
      outcome_var: baseline_score
      group_var: treatment_group
      report_title: "Distribution Shifts: Density Plot"

  - id: treatment_effects
    template: 3.03_treatment_effects.Rmd
    data: master_micro_survey.csv
    enabled: true
    params:
      outcome_var: endline_score
      group_var: treatment_group
      report_title: "Treatment Effects: Forest Plot"

  - id: subgroup_impacts
    template: 3.04_subgroup_impacts.Rmd
    data: master_micro_survey.csv
    enabled: true
    params:
      outcome_var: endline_score
      subgroup_var: income_tier
      report_title: "Subgroup Impacts: Coefficient Plot"

  - id: waffle_composition
    template: 3.05_waffle_chart.Rmd
    data: master_micro_survey.csv
    enabled: true
    params:
      status_var: tech_adopted
      report_title: "Composition Overview: Waffle Chart"

  - id: slopegraph
    template: 3.06_slopegraph.Rmd
    data: master_macro_panel.csv
    enabled: true
    params:
      entity_var: district
      value_var: literacy_rate
      start_time: 2021
      end_time: 2025
      report_title: "Longitudinal Panel: Slopegraph"

  - id: diverging_bar
    template: 3.07_diverging_bar.Rmd
    data: master_micro_survey.csv
    enabled: true
    params:
      entity_var: district
      response_var: parent_trust
      report_title: "Survey Sentiment: Diverging Bar Chart"

  - id: icon_array
    template: 3.08_icon_array.Rmd
    data: master_micro_survey.csv
    enabled: true
    params:
      category_var: attrition_status
      report_title: "Sample Attrition: Icon Array"

  - id: waterfall_budget
    template: 3.09_waterfall_chart.Rmd
    data: master_budget_pipeline.csv
    enabled: true
    params:
      category_var: budget_stage
      value_var: budget_amount
      report_title: "Budget Pipeline: Waterfall Chart"

  - id: bump_chart
    template: 3.10_bump_chart.Rmd
    data: master_macro_panel.csv
    enabled: true
    params:
      entity_var: district
      value_var: literacy_rate
      highlight_entity: Lahore
      report_title: "League Table: Bump Chart"

  - id: bullet_chart
    template: 3.11_bullet_chart.Rmd
    data: master_macro_panel.csv
    enabled: true
    params:
      entity_var: district
      value_var: literacy_rate
      target_var: target_score
      filter_time: 2025
      report_title: "Target Tracker: Bullet Chart"

  - id: deviation_bar
    template: 3.12_deviation_bar.Rmd
    data: master_macro_panel.csv
    enabled: true
    params:
      entity_var: district
      value_var: literacy_rate
      baseline_target: 65
      filter_time: 2025
      report_title: "Performance Outliers: Deviation Bar Chart"

  - id: ridgeline
    template: 3.13_ridgeline_plot.Rmd
    data: master_micro_survey.csv
    enabled: true
    params:
      group_var: income_tier
      value_var: endline_score
      max_groups: 8
      report_title: "Distribution Landscape: Ridgeline Plot"

  - id: calendar_heatmap
    template: 3.14_calendar_heatmap.Rmd
    data: master_daily_interaction.csv
    enabled: true
    params:
      date_var: date
      value_var: adoption_rate
      aggregate: none
      report_title: "High-Frequency Tracker: Calendar Heatmap"

  # --- Phase 5 templates -------------------------------------------------------

  # Same template (3.15), two entries: a light 5-district demo map and the
  # fuller Pakistan ADM2 map. geo_file/lookup_file are plain filenames resolved
  # under 1_data/geo/ by the template.
  - id: choropleth_demo
    template: 3.15_choropleth_map.Rmd
    data: master_district_indicators.csv
    enabled: true
    params:
      region_var: district
      value_var: literacy_rate
      geo_file: pk_districts_demo.geojson
      lookup_file: district_lookup.csv
      metric_name: "Adult Literacy Rate (%)"
      report_title: "District Map (Demo): Choropleth"

  - id: choropleth_pk
    template: 3.15_choropleth_map.Rmd
    data: master_district_indicators_pk.csv
    enabled: true
    params:
      region_var: district
      value_var: literacy_rate
      geo_file: pk_districts_adm2.geojson
      lookup_file: district_lookup.csv
      n_bins: 5
      metric_name: "Adult Literacy Rate (%)"
      report_title: "Pakistan Districts: Choropleth"

  - id: event_study
    template: 3.16_event_study.Rmd
    data: master_event_panel.csv
    enabled: true
    params:
      unit_var: school_id
      time_var: period
      event_time_var: event_time
      treat_var: treated
      outcome_var: test_score
      ref_period: -1
      metric_name: "Test Score"
      report_title: "Dynamic Impact: Event-Study Plot"

  - id: small_multiples
    template: 3.17_small_multiples.Rmd
    data: master_macro_panel.csv
    enabled: true
    params:
      facet_var: district
      x_var: year
      y_var: literacy_rate
      metric_name: "Literacy Rate (%)"
      report_title: "District Trends: Small Multiples"

  - id: heatmap_matrix
    template: 3.18_heatmap_matrix.Rmd
    data: master_macro_panel.csv
    enabled: true
    params:
      row_var: district
      col_var: year
      value_var: literacy_rate
      aggregate: none
      metric_name: "Literacy Rate (%)"
      report_title: "District × Year: Heatmap Matrix"

  # --- Phase 10 templates (RCT reporting narrative) ----------------------------

  - id: consort_flow
    template: 3.19_consort_flow.Rmd
    data: master_sample_flow.csv
    enabled: true
    params:
      stage_var: stage
      n_var: "n"          # quote: bare `n` is YAML-boolean false
      arm_var: arm
      note_var: note
      metric_name: "Participant Flow"
      report_title: "Trial Profile: CONSORT Flow Diagram"

  - id: balance_plot
    template: 3.20_balance_plot.Rmd
    data: master_micro_survey.csv
    enabled: true
    params:
      treat_var: treatment_group
      balance_vars:
        - baseline_score
        - gender
        - income_tier
      threshold: 0.1
      metric_name: "Covariate Balance"
      report_title: "Randomization Check: Covariate Balance (Love Plot)"

  - id: summary_table
    template: 3.21_summary_table.Rmd
    data: master_micro_survey.csv
    enabled: true
    params:
      group_var: treatment_group
      summary_vars:
        - baseline_score
        - endline_score
        - gender
        - income_tier
      digits: 1
      metric_name: "Sample Characteristics"
      report_title: "Table 1: Grouped Summary Statistics"

  - id: scatter_quadrant
    template: 3.22_scatter_quadrant.Rmd
    data: master_district_scatter.csv
    enabled: true
    params:
      x_var: spending_index
      y_var: outcome_score
      label_var: district
      x_split: "median"
      y_split: "median"
      quadrant_label_tr: "High spend · High outcome"
      quadrant_label_tl: "Efficient: low spend, high outcome"
      quadrant_label_br: "Underperforming: high spend, low outcome"
      quadrant_label_bl: "Low spend · Low outcome"
      metric_name: "Spending vs Outcomes"
      report_title: "Where Does the Money Work? Quadrant Scatter"

  - id: survival_curve
    template: 3.23_survival_curve.Rmd
    data: master_time_to_event.csv
    enabled: true
    params:
      time_var: weeks
      event_var: dropped
      group_var: group
      show_ci: true
      metric_name: "Program Retention"
      report_title: "Who Stays Enrolled? Kaplan-Meier Survival Curve"

# ------------------------------------------------------------------------------
# Combined report: stitches selected visuals into ONE self-contained HTML.
#   enabled  build it or not (individual reports above render regardless).
#   output   filename in 4_output/.
#   include  ORDERED list of ids from `reports:` above — controls what appears
#            and in what sequence. Ids must be enabled to be included.
#
# TO LEAVE A VISUAL OUT OF THE COMBINED REPORT: put a "#" at the start of its
# line below (comment it out). It stays defined and still renders on its own
# into 4_output/<id>.html — it's just skipped in the stitched report. Delete
# the "#" to add it back. Reorder the lines to change section order.
# ------------------------------------------------------------------------------

combined:
  enabled: true
  output: 3.00_cerp_combined_report.html
  title: "CERP Visualization Suite — Combined Report"
  author: "Ibraheem Saqib Ellahi"
  intro: >
    A single-file compendium of CERP policy visuals. Each section is rendered
    from its own template and dataset, then stitched under one shared house style.
  include:
    - baseline_endline     # 3.01 dumbbell plot
    - distribution_shifts  # 3.02 density plot
    - treatment_effects    # 3.03 forest plot
    - subgroup_impacts     # 3.04 coefficient plot
    - waffle_composition   # 3.05 waffle chart
    - slopegraph           # 3.06 slopegraph
    - diverging_bar        # 3.07 diverging bar chart
    - icon_array           # 3.08 icon array
    - waterfall_budget     # 3.09 waterfall chart
    - bump_chart           # 3.10 bump chart
    - bullet_chart         # 3.11 bullet chart
    - deviation_bar        # 3.12 deviation bar chart
    - ridgeline            # 3.13 ridgeline plot
    - calendar_heatmap     # 3.14 calendar heatmap
    - choropleth_demo      # 3.15 choropleth (5-district demo)
    - choropleth_pk        # 3.15 choropleth (Pakistan ADM2, stylized demo geometry)
    - event_study          # 3.16 event-study plot
    - small_multiples      # 3.17 small multiples
    - heatmap_matrix       # 3.18 heatmap matrix
    - consort_flow         # 3.19 CONSORT flow diagram
    - balance_plot         # 3.20 covariate balance love plot
    - summary_table        # 3.21 Table-1 grouped summary (gt)
    - scatter_quadrant     # 3.22 quadrant scatter
    - survival_curve       # 3.23 Kaplan-Meier survival curve
